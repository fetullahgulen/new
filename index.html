<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nehir ♡ zahid</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --pink-bg: #fff5f8;
            --pink-main: #ff85a2;
            --pink-dark: #f06292;
            --glass: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: linear-gradient(135deg, #fff5f8 0%, #ffeef2 100%); 
            font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; 
        }

        /* Glassmorphism */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: var(--shadow); border-radius: 30px;
        }

        /* Sayaç */
        .counter-box { margin: 20px 0; padding: 20px; text-align: center; width: 85%; max-width: 400px; }
        #days-count { font-size: 35px; font-weight: 700; color: var(--pink-dark); display: block; }
        .counter-box span { font-size: 14px; color: var(--pink-main); font-weight: 500; }

        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 20px;
            border: 2px solid white; background: rgba(255, 255, 255, 0.8); font-family: 'Poppins', sans-serif; font-size: 15px;
        }

        .btn-primary {
            background: var(--pink-main); color: white; border: none; padding: 16px; width: 100%; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        #login-overlay { position: fixed; inset: 0; background: var(--pink-bg); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { padding: 40px 30px; text-align: center; width: 85%; max-width: 350px; }

        #main-content { display: none; width: 100%; padding: 20px; flex-direction: column; align-items: center; }
        .tabs { position: sticky; top: 15px; z-index: 100; display: flex; gap: 8px; margin-bottom: 30px; }
        .tab-btn { background: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: 600; color: var(--pink-dark); box-shadow: var(--shadow); cursor: pointer; }
        .tab-btn.active { background: var(--pink-main); color: white; }

        /* Kartlar ve Görsel Efektler */
        .card { padding: 15px; position: relative; transition: 0.3s; margin-bottom: 10px; width: 100%; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 20px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card img:hover { transform: scale(1.05); }

        /* Günlük */
        #not-grid { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .not-card { padding: 20px; border-left: 5px solid var(--pink-main); text-align: left; }
        .not-date { font-size: 11px; color: var(--pink-main); margin-bottom: 5px; }

        #ses-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        #ss-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 800px; }

        .custom-player { background: rgba(255, 255, 255, 0.4); border-radius: 20px; padding: 15px; }
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: var(--pink-main); border: none; border-radius: 50%; width: 45px; height: 45px; color: white; cursor: pointer; }
        .seek-slider { flex: 1; -webkit-appearance: none; background: #ddd; height: 6px; border-radius: 10px; }
        .seek-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--pink-main); border-radius: 50%; border: 3px solid white; }

        #admin-panel { display: none; width: 95%; max-width: 450px; padding: 25px; margin-top: 30px; margin-bottom: 50px; }
        #toast { position: fixed; bottom: 30px; background: var(--pink-dark); color: white; padding: 12px 25px; border-radius: 50px; font-size: 13px; display: none; z-index: 15000; }
        .heart { position: fixed; color: var(--pink-main); pointer-events: none; z-index: -1; animation: fly 4s linear; }
        @keyframes fly { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="login-overlay">
        <div class="login-box glass-card">
            <h3 style="color:var(--pink-dark)">Hoş geldin ♡</h3>
            <input type="password" id="pass" placeholder="Şifre...">
            <button class="btn-primary" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <div id="main-content">
        <div class="counter-box glass-card">
            <span id="days-count">0</span>
            <span>Gündür Beraberiz ♡</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="tab('ses', this)">🎵 SESLER</button>
            <button class="tab-btn" onclick="tab('ss', this)">📸 GÖRSELLER</button>
            <button class="tab-btn" onclick="tab('not', this)">📝 GÜNLÜK</button>
        </div>

        <div id="ses-grid" class="area"></div>
        <div id="ss-grid" class="area" style="display:none;"></div>
        <div id="not-grid" class="area" style="display:none;"></div>

        <div id="admin-panel" class="glass-card">
            <p style="font-weight:600; color:var(--pink-dark); text-align:center;">✨ Yönetim</p>
            <select id="type" onchange="toggleInputs()">
                <option value="ses">Ses Dosyası 🎵</option>
                <option value="ss">Resim / SS 📸</option>
                <option value="not">Günlük Notu 📝</option>
            </select>
            <input type="text" id="name" placeholder="Başlık / Özet">
            <input type="text" id="link" placeholder="Discord Linki">
            <textarea id="note-text" placeholder="Notunuzu yazın..." style="display:none; height:100px;"></textarea>
            <button class="btn-primary" onclick="save()">Kaydet ♡</button>
        </div>
    </div>

    <script>
        // Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyBr3pYSUGjFyoLNXz3OS9mluBEriCCxyCw",
            authDomain: "ses-efcb4.firebaseapp.com",
            databaseURL: "https://ses-efcb4-default-rtdb.firebaseio.com",
            projectId: "ses-efcb4",
            storageBucket: "ses-efcb4.firebasestorage.app",
            messagingSenderId: "935403740924",
            appId: "1:935403740924:web:597306db08302cb42bc179"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;

        // Basit ve Garantili Giriş Fonksiyonu
        function login() {
            const pass = document.getElementById('pass').value.toLowerCase().trim();
            
            // Güvenlik: Base64 veya Hash yerine şimdilik direkt kontrol (sorunsuz çalışması için)
            if (pass === "nehir") {
                isAdmin = true;
                loginSuccess();
            } else if (pass === "yesbe") {
                isAdmin = false;
                loginSuccess();
            } else {
                showToast("Şifre hatalı! ♡");
            }
        }

        function loginSuccess() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            if(isAdmin) document.getElementById('admin-panel').style.display = 'block';
            updateCounter();
            load();
            setInterval(heart, 800);
        }

        function updateCounter() {
            const startDate = new Date("2024-01-01"); // TANIŞMA TARİHİNİZİ BURAYA YAZ
            const diff = new Date() - startDate;
            document.getElementById('days-count').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function toggleInputs() {
            const t = document.getElementById('type').value;
            document.getElementById('link').style.display = t === 'not' ? 'none' : 'block';
            document.getElementById('note-text').style.display = t === 'not' ? 'block' : 'none';
        }

        function save() {
            const n = document.getElementById('name').value;
            const l = document.getElementById('link').value;
            const t = document.getElementById('type').value;
            const txt = document.getElementById('note-text').value;
            const date = new Date().toLocaleDateString('tr-TR');

            if(n && (l || txt)) {
                db.ref('arsiv').push({ n, l, t, txt, date });
                showToast("Eklendi! ♡");
                document.getElementById('name').value = ""; 
                document.getElementById('link').value = "";
                document.getElementById('note-text').value = "";
            }
        }

        function load() {
            db.ref('arsiv').on('value', s => {
                const grids = { ses: document.getElementById('ses-grid'), ss: document.getElementById('ss-grid'), not: document.getElementById('not-grid') };
                Object.values(grids).forEach(g => g.innerHTML = "");

                s.forEach(c => {
                    const d = c.val(); const k = c.key;
                    const del = isAdmin ? `<button onclick="deleteItem('${k}')" style="position:absolute; top:10px; right:10px; background:var(--pink-dark); color:white; border:none; width:25px; height:25px; border-radius:50%; cursor:pointer; z-index:10;">X</button>` : '';

                    if(d.t === 'ss') {
                        const div = document.createElement('div'); div.className = 'card glass-card';
                        div.innerHTML = `${del}<img src="${d.l}" onclick="window.open('${d.l}')"><p style="margin-top:10px; font-weight:600; text-align:center; color:var(--pink-dark)">${d.n}</p>`;
                        grids.ss.appendChild(div);
                    } else if(d.t === 'not') {
                        const div = document.createElement('div'); div.className = 'not-card glass-card';
                        div.innerHTML = `${del}<div class="not-date">${d.date}</div><div style="font-weight:600; color:var(--pink-dark);">${d.n}</div><div style="font-size:13px; margin-top:5px;">${d.txt}</div>`;
                        grids.not.appendChild(div);
                    } else {
                        const div = document.createElement('div'); div.className = 'card glass-card';
                        div.innerHTML = `${del}<p style="font-weight:600; color:var(--pink-dark); margin-bottom:10px;">♡ ${d.n}</p><div class="custom-player"><audio id="audio-${k}" src="${d.l}"></audio><div class="player-controls"><button class="play-btn" onclick="toggleP('${k}')">▶</button><input type="range" class="seek-slider" id="seek-${k}" value="0" step="0.1" oninput="seekA('${k}')"></div></div>`;
                        grids.ses.appendChild(div);
                        setupA(k);
                    }
                });
            });
        }

        function toggleP(k) { const a = document.getElementById('audio-'+k); a.paused ? a.play() : a.pause(); }
        function setupA(k) { const a = document.getElementById('audio-'+k); const s = document.getElementById('seek-'+k); a.ontimeupdate = () => s.value = (a.currentTime / a.duration) * 100; }
        function seekA(k) { const a = document.getElementById('audio-'+k); const s = document.getElementById('seek-'+k); a.currentTime = (s.value / 100) * a.duration; }
        function deleteItem(k) { if(confirm("Silinsin mi? ♡")) db.ref('arsiv').child(k).remove(); }
        
        function tab(id, b) {
            document.querySelectorAll('.area').forEach(a => a.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id + '-grid').style.display = id === 'ss' ? 'grid' : 'flex';
            b.classList.add('active');
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function heart() { const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '💗'; h.style.left = Math.random() * 100 + 'vw'; h.style.fontSize = (Math.random() * 20 + 15) + 'px'; document.body.appendChild(h); setTimeout(() => h.remove(), 4000); }
    </script>
</body>
</html>
