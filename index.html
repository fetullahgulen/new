<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahid | Discord Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen">

    <div id="discord-card" class="glass-card p-6 rounded-3xl w-full max-w-sm transition-all duration-500 hover:scale-105 opacity-0">
        <div class="flex items-center space-x-4">
            <div class="relative">
                <img id="avatar" src="" class="w-20 h-20 rounded-2xl border-2 border-slate-700">
                <div id="status-indicator" class="absolute bottom-1 right-1 w-4 h-4 rounded-full border-2 border-slate-900"></div>
            </div>
            <div>
                <h2 id="username" class="text-white text-xl font-bold tracking-tight">Yükleniyor...</h2>
                <p id="custom-status" class="text-slate-400 text-sm italic truncate"></p>
            </div>
        </div>
        
        <div id="spotify-container" class="mt-4 p-3 bg-green-500/10 border border-green-500/20 rounded-xl hidden">
            </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
