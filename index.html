<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zahid | Custom Audio Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            /* BURADAN İSTEDİĞİN RENGİ DEĞİŞTİREBİLİRSİN */
            --plyr-color-main: #00ff88; 
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .player-container {
            width: 400px;
            padding: 30px;
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1);
        }

        h2 {
            color: var(--plyr-color-main);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Plyr Oynatıcıyı Karanlık Yapma */
        .plyr--audio .plyr__controls {
            background: transparent !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2>System_Audio_Node</h2>
        
        <audio id="player" controls>
            <source src="https://docs.google.com/uc?export=download&id=1IqiSnzX1FBrigtLSBRNdfcHpnx_FKVLk" type="audio/mp4" />
        </audio>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', {
            tooltips: { controls: true, seek: true }
        });
    </script>
</body>
</html>
