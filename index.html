<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nehir♡</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --pink-bg: #fff5f8;
            --pink-main: #ff85a2;
            --pink-dark: #f06292;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(255, 133, 162, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--pink-bg); font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; }

        /* --- MODERN GİRİŞ VE PANEL KUTULARI --- */
        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 20px;
            border: 2px solid #ffeef2; background: #fff; font-family: 'Poppins', sans-serif;
            font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--pink-main); box-shadow: 0 0 12px rgba(255, 133, 162, 0.1); }

        .btn-primary {
            background: var(--pink-main); color: white; border: none;
            padding: 16px; width: 100%; border-radius: 20px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* --- GİRİŞ EKRANI --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--pink-bg);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: white; padding: 40px 30px; border-radius: 35px;
            text-align: center; width: 85%; max-width: 350px; box-shadow: var(--shadow);
        }

        /* --- ANA İÇERİK --- */
        #main-content { display: none; width: 100%; padding: 20px; flex-direction: column; align-items: center; }
        .tabs { position: sticky; top: 15px; z-index: 100; display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn {
            background: white; border: none; padding: 12px 25px;
            border-radius: 50px; font-weight: 600; color: var(--pink-dark);
            box-shadow: var(--shadow); cursor: pointer;
        }
        .tab-btn.active { background: var(--pink-main); color: white; }

        /* --- LİSTE YAPISI --- */
        #ses-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        #ss-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 800px; }

        .card {
            background: white; border-radius: 28px; padding: 20px;
            box-shadow: var(--shadow); position: relative; border: 1px solid #fff;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 22px; cursor: pointer; }
        .card p { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--pink-dark); text-align: center; }

        /* --- MODERN SES OYNATICI --- */
        .custom-player { background: #fffafb; border-radius: 22px; padding: 15px; border: 1px solid #ffebf2; }
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn {
            background: var(--pink-main); border: none; border-radius: 50%;
            width: 50px; height: 50px; color: white; font-size: 20px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .seek-slider {
            flex: 1; -webkit-appearance: none; background: #eee; height: 10px; border-radius: 10px; cursor: pointer;
        }
        .seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; background: var(--pink-main);
            border-radius: 50%; border: 4px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        /* --- SİLME MODALI --- */
        #confirm-modal {
            position: fixed; inset: 0; background: rgba(255, 133, 162, 0.3);
            display: none; justify-content: center; align-items: center; z-index: 20000; backdrop-filter: blur(8px);
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 35px; text-align: center;
            width: 80%; max-width: 320px; box-shadow: var(--shadow);
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none; width: 95%; max-width: 450px; background: white;
            padding: 30px; border-radius: 35px; margin-top: 40px; box-shadow: var(--shadow);
        }

        #toast {
            position: fixed; bottom: 30px; background: var(--pink-dark); color: white;
            padding: 12px 25px; border-radius: 50px; font-size: 13px; display: none; z-index: 15000;
        }

        .heart { position: fixed; color: var(--pink-main); pointer-events: none; z-index: -1; animation: fly 4s linear; }
        @keyframes fly { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="confirm-modal">
        <div class="modal-box">
            <p style="font-weight:600; color:var(--pink-dark); font-size:18px;">Emin misin? ♡</p>
            <p style="font-size:13px; color:#888;">Bu içerik kalıcı olarak silinecek.</p>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button onclick="closeModal()" style="flex:1; padding:14px; border-radius:18px; border:none; background:#f0f0f0; font-weight:600;">İptal</button>
                <button id="confirm-delete-btn" style="flex:1; padding:14px; border-radius:18px; border:none; background:var(--pink-main); color:white; font-weight:600;">Sil</button>
            </div>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h3> ♡</h3>
            <input type="password" id="pass" placeholder="Şifre...">
            <button class="btn-primary" onclick="check()">GİRİŞ</button>
        </div>
    </div>

    <div id="main-content">
        <h2 style="color: var(--pink-dark); margin-bottom:5px;">nehir ve zahid'in gizli dosyaları</h2>
        <p style="font-size:12px; color:var(--pink-main); margin-bottom:20px;"> ♡</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="tab('ses', this)">🎵 SESLER</button>
            <button class="tab-btn" onclick="tab('ss', this)">📸 GÖRSELLER</button>
        </div>

        <div id="ses-grid" class="area"></div>
        <div id="ss-grid" class="area" style="display:none;"></div>

        <div id="admin-panel">
            <p style="font-weight:600; color:var(--pink-dark); margin-bottom:15px; text-align:center;">✨</p>
            <input type="text" id="name" placeholder="Başlık">
            <input type="text" id="link" placeholder="Discord Linki">
            <select id="type">
                <option value="ses">Ses Dosyası 🎵</option>
                <option value="ss">Resim / SS 📸</option>
            </select>
            <button class="btn-primary" onclick="save()" style="margin-top:10px;">Kaydet ♡</button>
        </div>
    </div>

    <script>
        // FIREBASE BİLGİLERİNİ BURAYA YAPIŞTIR
        const firebaseConfig = {
  apiKey: "AIzaSyBr3pYSUGjFyoLNXz3OS9mluBEriCCxyCw",
  authDomain: "ses-efcb4.firebaseapp.com",
  databaseURL: "https://ses-efcb4-default-rtdb.firebaseio.com",
  projectId: "ses-efcb4",
  storageBucket: "ses-efcb4.firebasestorage.app",
  messagingSenderId: "935403740924",
  appId: "1:935403740924:web:597306db08302cb42bc179",
  measurementId: "G-SLFGZEEKMK"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;
        let deleteKey = null;

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

       // Şifrelerin SHA-256 karmaları (Örnek: nehir -> 5e88489... gibi görünür)
// Bu sayede incele diyen kişi gerçek kelimeyi göremez.
async function check() {
    const input = document.getElementById('pass').value.toLowerCase().trim();
    
    // Girdiğin şifreyi karmaşık bir koda dönüştüren fonksiyon
    const msgUint8 = new TextEncoder().encode(input);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    // 'nehir' şifresinin SHA-256 karşılığı:
    const adminHash = "71569426f8d169c73330f65b53f6567a142f360341764619d856d6cc99723a10";
    // 'yesbe' şifresinin SHA-256 karşılığı:
    const userHash = "19601335a9a4e98f4806509a7b9f8482025178696d7f6424683050c9f1348123";

    if (hashHex === adminHash || hashHex === userHash) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        
        if(hashHex === adminHash) {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
        }
        load();
        setInterval(heart, 800);
    } else {
        showToast("Hatalı şifre! ♡");
    }
}

        function tab(id, b) {
            document.querySelectorAll('.area').forEach(a => a.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id + '-grid').style.display = id === 'ses' ? 'flex' : 'grid';
            b.classList.add('active');
        }

        function openDelete(k) { deleteKey = k; document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

        document.getElementById('confirm-delete-btn').onclick = () => {
            if(deleteKey) { db.ref('arsiv').child(deleteKey).remove(); closeModal(); showToast("Silindi! ♡"); }
        };

        function save() {
            const n = document.getElementById('name').value;
            const l = document.getElementById('link').value;
            const t = document.getElementById('type').value;
            if(n && l) {
                db.ref('arsiv').push({ n, l, t });
                document.getElementById('name').value = ""; document.getElementById('link').value = "";
                showToast("Başarıyla eklendi! ♡");
            }
        }

        function load() {
            db.ref('arsiv').on('value', s => {
                const ses = document.getElementById('ses-grid'); const ss = document.getElementById('ss-grid');
                ses.innerHTML = ""; ss.innerHTML = "";
                s.forEach(c => {
                    const d = c.val(); const k = c.key;
                    const card = document.createElement('div'); card.className = 'card';
                    const del = isAdmin ? `<button onclick="openDelete('${k}')" style="position:absolute; top:12px; right:12px; background:var(--pink-main); color:white; border:none; width:30px; height:30px; border-radius:50%; font-size:12px; cursor:pointer; z-index:10;">X</button>` : '';

                    if(d.t === 'ss') {
                        card.innerHTML = `${del}<img src="${d.l}" onclick="window.open('${d.l}')"><p style="margin-top:10px">♡ ${d.n}</p>`;
                        ss.appendChild(card);
                    } else {
                        card.innerHTML = `
                            ${del}<p>♡ ${d.n}</p>
                            <div class="custom-player">
                                <audio id="audio-${k}" src="${d.l}"></audio>
                                <div class="player-controls">
                                    <button class="play-btn" id="btn-${k}" onclick="togglePlay('${k}', '${d.n}')">▶</button>
                                    <input type="range" class="seek-slider" id="seek-${k}" value="0" step="0.1" oninput="seekAudio('${k}')">
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:12px; font-weight:600; color:var(--pink-dark);">
                                    <span id="cur-${k}">0:00</span><span id="dur-${k}">0:00</span>
                                </div>
                            </div>`;
                        ses.appendChild(card);
                        setupAudio(k);
                    }
                });
            });
        }

        // SPOTIFY KİLİT EKRANI VE OYNATMA
        function togglePlay(k, name) {
            const a = document.getElementById('audio-' + k); const b = document.getElementById('btn-' + k);
            if(a.paused) {
                document.querySelectorAll('audio').forEach(el => { el.pause(); });
                document.querySelectorAll('.play-btn').forEach(el => el.innerText = "▶");
                a.play(); b.innerText = "||";
                
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: name, artist: "",
                        artwork: [{ src: 'https://cdn.discordapp.com/avatars/1275159983318630513/a2c37b11570db827f22acd3ea6bc4bda.png?size=1024', sizes: '512x512', type: 'image/png' }]
                    });
                }
            } else { a.pause(); b.innerText = "▶"; }
        }

        function setupAudio(k) {
            const a = document.getElementById('audio-' + k); const s = document.getElementById('seek-' + k);
            a.onloadedmetadata = () => document.getElementById('dur-' + k).innerText = format(a.duration);
            a.ontimeupdate = () => {
                s.value = (a.currentTime / a.duration) * 100;
                document.getElementById('cur-' + k).innerText = format(a.currentTime);
            };
        }

        function seekAudio(k) {
            const a = document.getElementById('audio-' + k); const s = document.getElementById('seek-' + k);
            a.currentTime = (s.value / 100) * a.duration;
        }

        function format(sec) {
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        function heart() {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '💗';
            h.style.left = Math.random() * 100 + 'vw'; h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(h); setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
